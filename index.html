<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Golden Snack Date Calculator</title>

    <link rel="icon" type="image/x-icon" href="./favicon.ico" />
    <link rel="apple-touch-icon" href="./gs-logo-square.png" />

    <link rel="stylesheet" href="./style.css" />
</head>

<body>
    <main class="page">
        <section class="card">
            <div class="brand">
                <img src="./gs-logo-square.png" alt="Golden Snack logo" class="brand-logo" />

                <div class="brand-text">
                    <p class="brand-name">Golden Snack</p>
                    <p class="brand-subname">Date Calculator</p>
                </div>
            </div>

            <h1>Výpočet data</h1>
            <p class="subtitle">
                Vyber datum výroby a typ příjmu nebo výdeje zboží
            </p>

            <div class="field">
                <label for="date">Datum výroby</label>
                <div class="input-wrap">
                    <input type="date" id="date" />
                </div>
            </div>

            <div class="field">
                <label for="days">Výber příjmu / výdeje zboží</label>
                <div class="input-wrap">
                    <select id="days">
                        <option value="73">Biosaurus příjem</option>
                        <option value="61">Little Angels příjem</option>
                        <option value="91">Biosaurus výdej ze skladu</option>
                        <option value="68">Little Angels výdej ze skladu</option>
                        <option value="44">Výdej zboží GS se zárukou 6 měsíců</option>
                        <option value="52">Výdej zboží GS se zárukou 7 měsíců</option>
                    </select>
                </div>
            </div>

            <div class="button-row">
                <button id="calcBtn" type="button">Vypočítat datum</button>
                <button id="resetBtn" type="button" class="reset-btn">Reset</button>
            </div>

            <div class="result">
                <span class="result-label">Výsledek</span>
                <span class="result-value" id="resultValue">Výsledek se zobrazí zde</span>
            </div>

            <p class="footer-text">by Golden Snack</p>
        </section>
    </main>

    <script src="./script.js"></script>
</body>

</html>
